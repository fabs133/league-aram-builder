<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAM Oracle</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div id="header" class="panel header">
            <span class="logo">ARAM ORACLE</span>
            <span class="separator">|</span>
            <span id="champion-name" class="champ-name">---</span>
            <span class="separator">|</span>
            <span id="game-time" class="game-time">0:00</span>
            <span class="separator">|</span>
            <span id="gold" class="gold">0g</span>
            <span class="separator">|</span>
            <span id="phase" class="phase">---</span>
            <span class="spacer"></span>
            <span id="connection-dot" class="dot disconnected" title="Disconnected"></span>
        </div>

        <!-- Waiting state -->
        <div id="waiting" class="panel waiting">
            <div class="waiting-title">Waiting for game...</div>
            <div class="waiting-sub">Start an ARAM match. The overlay updates automatically.</div>
            <div class="waiting-sub">Live Client Data API: https://127.0.0.1:2999</div>
        </div>

        <!-- Augment Recommendations -->
        <div id="section-augments" class="section collapsed">
            <div class="section-header" data-toggle="augments">
                <span class="arrow">&#9660;</span> AUGMENT PICK
                <span id="augment-progress" class="augment-progress hidden">0/0</span>
                <span id="reroll-badge" class="reroll-badge hidden">REROLL</span>
            </div>
            <div class="section-body" id="augments-body">
                <div id="augment-list" class="augment-list">
                    <!-- Populated by JS -->
                </div>
                <div id="augment-confirm" class="augment-confirm hidden">
                    <!-- Populated by JS when stat delta matching is ambiguous -->
                </div>
                <div id="augment-toast" class="augment-toast hidden">
                    <!-- Brief auto-detected notification -->
                </div>
                <div id="reroll-banner" class="reroll-banner hidden">
                    <span id="reroll-reason"></span>
                </div>
            </div>
        </div>

        <!-- OCR Detection + Manual Augment Input -->
        <div id="section-input" class="section collapsed">
            <div class="section-header" data-toggle="input">
                <span class="arrow">&#9660;</span> DETECT AUGMENTS
                <span id="ocr-status" class="ocr-status-badge" title="OCR status"></span>
            </div>
            <div class="section-body" id="input-body">
                <!-- OCR scan controls -->
                <div class="ocr-controls">
                    <button id="btn-scan" class="btn btn-scan">Scan Screen</button>
                    <label class="ocr-toggle">
                        <input type="checkbox" id="ocr-auto" checked>
                        <span>Auto-detect</span>
                    </label>
                </div>
                <div id="ocr-detected" class="ocr-detected hidden">
                    <!-- Populated by JS on OCR result -->
                </div>

                <!-- Manual fallback -->
                <div class="input-divider"><span>or search manually</span></div>
                <div class="input-row">
                    <input type="text" id="augment-search" placeholder="Search augments..."
                           autocomplete="off" spellcheck="false">
                    <select id="tier-filter">
                        <option value="">All</option>
                        <option value="1">Silver</option>
                        <option value="2">Gold</option>
                        <option value="3">Prismatic</option>
                    </select>
                </div>
                <div id="search-results" class="search-results"></div>
                <div id="selected-augments" class="selected-augments"></div>
                <div class="input-actions">
                    <button id="btn-evaluate" class="btn btn-evaluate" disabled>Evaluate (0/3)</button>
                    <button id="btn-clear-input" class="btn btn-clear">Clear</button>
                </div>
            </div>
        </div>

        <!-- Build Path -->
        <div id="section-build" class="section collapsed">
            <div class="section-header" data-toggle="build">
                <span class="arrow">&#9660;</span> BUILD PATH
            </div>
            <div class="section-body" id="build-body">
                <div id="build-list" class="build-list">
                    <!-- Populated by JS -->
                </div>
                <div id="build-footer" class="build-footer"></div>
            </div>
        </div>

        <!-- Enemies -->
        <div id="section-enemies" class="section collapsed">
            <div class="section-header" data-toggle="enemies">
                <span class="arrow">&#9660;</span> ENEMIES
            </div>
            <div class="section-body" id="enemies-body">
                <div id="enemy-list" class="enemy-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
